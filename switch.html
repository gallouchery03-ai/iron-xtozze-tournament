<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Switch</title>

<style>

body{
background:#050505;
color:white;
font-family:Arial;
padding:15px;
}

#teams{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:20px;
}

.team{
background:#111;
border:1px solid red;
padding:10px;
border-radius:8px;
text-align:center;
}

button{background:red;color:white;border:none;padding:8px;margin:3px;border-radius:6px}

.player{display:block}

</style>

</head>

<body>

<h1>🎮 SWITCH</h1>

<button onclick="generate()">Créer équipes</button>
<button onclick="clearT()">Reset</button>

<div id="teams"></div>

<script>

function getPlayers(){
return JSON.parse(localStorage.getItem("players")||"[]")
}

function generate(){

let p=getPlayers();
let size=3;

let d=document.getElementById("teams");
d.innerHTML="";

for(let i=0;i<17;i++){

let team=p.slice(i*size,(i+1)*size);

let html="";

team.forEach(x=>{
html+=`<span class="player">${x.name}</span>`;
});

d.innerHTML+=`
<div class="team">
TEAM ${i+1}
${html}
</div>
`;
}

}

function clearT(){
document.getElementById("teams").innerHTML="";
}

</script>

</body>
</html>
