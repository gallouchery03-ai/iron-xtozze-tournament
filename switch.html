<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Switch</title>

<style>

body{
background:#050505;
color:white;
font-family:Arial;
padding:15px;
}

h1{
text-align:center;
color:#ff3030;
}

#timer{
text-align:center;
font-size:60px;
color:#ff3030;
margin:10px;
}

button{
background:#ff3030;
color:white;
border:none;
padding:8px 12px;
margin:3px;
border-radius:8px;
cursor:pointer;
}

.team{
background:#111;
border:1px solid #ff3030;
padding:10px;
margin:5px 0;
border-radius:8px;
}

.title{
color:#ff3030;
font-weight:bold;
}

.player{
margin-left:10px;
color:white;
}
</style>

</head>

<body>

<h1>🔥 IRON x XTOZZE TOURNOI 🔥</h1>

<div id="timer">00:00</div>

<div style="text-align:center;">
<button onclick="start()">START</button>
<button onclick="pause()">PAUSE</button>
<button onclick="reset()">STOP</button>
<br>
<button onclick="add(10)">+10s</button>
<button onclick="add(30)">+30s</button>
<button onclick="add(60)">+1m</button>
</div>

<br>

<button onclick="generate()">GÉNÉRER ÉQUIPES</button>

<div id="teams"></div>

<script>

let t=0, inter=null;

function update(){
let m=Math.floor(t/60);
let s=t%60;
document.getElementById("timer").innerText=
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}

function start(){
if(inter) return;
inter=setInterval(()=>{
if(t>0){t--;update();}
},1000);
}

function pause(){
clearInterval(inter);
inter=null;
}

function reset(){
pause();
t=0;
update();
}

function add(x){
t+=x;
update();
}

function getPlayers(){
return JSON.parse(localStorage.getItem("players")||"[]");
}

function generate(){

let players = getPlayers();
let teamSize = 3;

let container = document.getElementById("teams");
container.innerHTML="";

for(let i=0;i<players.length;i+=teamSize){

let team = players.slice(i,i+teamSize);

let html="";

team.forEach(p=>{
html += `<span class="player">${p}</span>`;
});

container.innerHTML += `
<div class="team">
<div class="title">TEAM ${(i/teamSize)+1}</div>
${html}
</div>
`;

}

}

update();

</script>

</body>
</html>
