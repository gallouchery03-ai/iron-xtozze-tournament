<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SWITCH Warzone</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0b0b0b;color:#fff;font-family:Arial;padding:15px}
h1{text-align:center;color:#ff3030;margin-bottom:15px}
.main{display:grid;grid-template-columns:320px 360px 1fr;gap:15px}
.panel{background:#111;border:2px solid #ff3030;border-radius:12px;padding:15px;height:650px;overflow:hidden}
input{width:100%;padding:10px;background:#1c1c1c;color:#fff;border:1px solid #333;border-radius:6px}
button{background:#ff3030;color:#fff;border:none;padding:8px 12px;border-radius:6px;cursor:pointer;margin:2px}
button:hover{opacity:.85}
.player-list{height:500px;overflow-y:auto;margin-top:10px}
.player{display:flex;justify-content:space-between;padding:6px;border-bottom:1px solid #222}
.timer{text-align:center;font-size:90px;color:#ff3030;font-weight:bold;height:140px;line-height:140px}
.center{text-align:center}
.teams{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;height:560px;overflow-y:auto}
.team{background:#1b1b1b;border:1px solid #ff3030;border-radius:8px;padding:8px}
.team h3{text-align:center;color:#ff3030;margin-bottom:5px}
.teamline{text-align:center;padding:10px}
.stats{text-align:center;margin-bottom:10px}
</style>
</head>
<body>

<h1>SWITCH WARZONE</h1>

<div class="main">

<div class="panel">
<h2>Joueurs</h2><br>
<input id="playerName" placeholder="Nom du joueur" onkeypress="if(event.key==='Enter')addPlayer()">
<br><br>
<button onclick="addPlayer()">Ajouter</button>
<button onclick="copyPlayers()">Copier liste</button>
<div class="stats">Joueurs : <span id="count">0</span></div>
<div id="playerList" class="player-list"></div>
</div>

<div class="panel">
<h2 class="center">Timer</h2>
<div id="timer" class="timer">00:00</div>
<div class="center">
<button onclick="addTime(5)">+5s</button>
<button onclick="addTime(10)">+10s</button>
<button onclick="addTime(20)">+20s</button>
<button onclick="addTime(30)">+30s</button><br><br>
<button onclick="addTime(60)">+1m</button>
<button onclick="addTime(120)">+2m</button><br><br>
<button onclick="startTimer()">START</button>
<button onclick="pauseTimer()">PAUSE</button>
<button onclick="resetTimer()">RESET</button><br><br>
<button onclick="generateTeams()">🎲 Générer équipes</button>
<button onclick="copyTeams()">📋 Copier équipes</button>
</div>
</div>

<div class="panel">
<h2>17 Équipes Trio</h2><br>
<div id="teams" class="teams"></div>
</div>

</div>

<script>
let players=JSON.parse(localStorage.getItem('players')||'[]');
let teamsData=[];

function save(){
localStorage.setItem('players',JSON.stringify(players));
}

function renderPlayers(){
const box=document.getElementById('playerList');
box.innerHTML='';
players.forEach((p,i)=>{
box.innerHTML+=`<div class="player">${p}<button onclick="removePlayer(${i})">❌</button></div>`;
});
document.getElementById('count').textContent=players.length;
save();
}

function addPlayer(){
const input=document.getElementById('playerName');
const n=input.value.trim();
if(!n)return;
players.push(n);
input.value='';
renderPlayers();
}

function removePlayer(i){
players.splice(i,1);
renderPlayers();
}

function shuffle(a){
for(let i=a.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
}

function generateTeams(){
let list=[...players];
shuffle(list);
teamsData=[];
for(let i=0;i<17;i++) teamsData.push([]);
let idx=0;
for(let t=0;t<17;t++){
for(let j=0;j<3;j++){
if(idx<list.length){
teamsData[t].push(list[idx]);
idx++;
}
}
}
renderTeams();
}

function renderTeams(){
const box=document.getElementById('teams');
box.innerHTML='';
teamsData.forEach((team,i)=>{
box.innerHTML+=`
<div class="team">
<h3>TEAM ${i+1}</h3>
<div class="center">
<button onclick="rerollTeam(${i})">🔄</button>
<button onclick="deleteTeam(${i})">❌</button>
</div>
<div class="teamline">${team.join(' x ')}</div>
</div>`;
});
}

function deleteTeam(i){
teamsData[i]=[];
renderTeams();
}

function rerollTeam(i){
let list=[...players];
shuffle(list);
teamsData[i]=list.slice(0,3);
renderTeams();
}

function copyTeams(){
let txt='';
teamsData.forEach((t,i)=>{
txt+=`TEAM ${i+1}\n${t.join(' x ')}\n\n`;
});
navigator.clipboard.writeText(txt);
alert('Équipes copiées');
}

function copyPlayers(){
navigator.clipboard.writeText(players.join('\\n'));
alert('Liste copiée');
}

let seconds=0, interval=null;

function updateTimer(){
let m=Math.floor(seconds/60);
let s=seconds%60;
document.getElementById('timer').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

function addTime(x){seconds+=x;updateTimer();}
function startTimer(){
if(interval)return;
interval=setInterval(()=>{
if(seconds>0){seconds--;updateTimer();}
},1000);
}
function pauseTimer(){clearInterval(interval);interval=null;}
function resetTimer(){pauseTimer();seconds=0;updateTimer();}

renderPlayers();
updateTimer();
</script>
</body>
</html>
