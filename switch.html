<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TOURNOI WZ SWITCH</title>

<style>

body{
background:#050505;
color:white;
font-family:Arial;
padding:15px;
}

h1{
text-align:center;
color:#ff3030;
text-shadow:0 0 10px red;
}

/* TIMER */
#timer{
text-align:center;
font-size:60px;
font-weight:bold;
color:#ff3030;
margin:10px;
}

.center{
text-align:center;
}

/* BUTTONS */
button{
background:#ff3030;
color:white;
border:none;
padding:8px 12px;
margin:3px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:0.85;
}

/* INFO TABLE */
.info{
margin:20px auto;
text-align:center;
}

#stats{
display:flex;
justify-content:center;
gap:20px;
margin-top:10px;
flex-wrap:wrap;
}

.box{
background:#111;
border:1px solid red;
padding:10px 15px;
border-radius:8px;
min-width:150px;
font-weight:bold;
}

/* TEAMS */
.team{
background:#111;
border:1px solid #ff3030;
padding:10px;
margin-bottom:8px;
border-radius:8px;
}

.title{
color:#ff3030;
font-weight:bold;
}

.player{
display:inline-block;
margin-right:8px;
opacity:0.9;
}

.score{
float:right;
color:#00ff00;
font-weight:bold;
}

</style>

</head>

<body>

<h1>🔥 IRON x XTOZZE TOURNOI 🔥</h1>

<div id="timer">00:00</div>

<div class="center">

<button onclick="start()">START</button>
<button onclick="pause()">PAUSE</button>
<button onclick="reset()">STOP</button>

<br>

<button onclick="add(10)">+10s</button>
<button onclick="add(30)">+30s</button>
<button onclick="add(60)">+1m</button>

<br><br>

<button onclick="generate()">🎲 CRÉER ÉQUIPES</button>
<button onclick="clearTeams()">🗑 SUPPRIMER ÉQUIPES</button>

</div>

<!-- 💣 TABLE CASHPRIZE -->
<div class="info">

<h2>📊 INFORMATIONS TOURNOI</h2>

<div id="stats">

<div class="box">
👥 INSCRITS : <span id="countPlayers">0</span>
</div>

<div class="box">
💰 ENTRÉE (10€) : <span id="entryMoney">0€</span>
</div>

<div class="box">
🏆 PRIZEPOOL : <span id="prizePool">0€</span>
</div>

</div>

</div>

<br>

<div id="teams"></div>

<script>

/* TIMER */
let time=0;
let interval=null;

function update(){
let m=Math.floor(time/60);
let s=time%60;
document.getElementById("timer").innerText=
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}

function start(){
if(interval)return;
interval=setInterval(()=>{
if(time>0){time--;update();}
},1000);
}

function pause(){
clearInterval(interval);
interval=null;
}

function reset(){
pause();
time=0;
update();
}

function add(sec){
time+=sec;
update();
}

/* PLAYERS */
function getPlayers(){
return JSON.parse(localStorage.getItem("players")||"[]");
}

/* CLASSEMENT */
let classement = JSON.parse(localStorage.getItem("classement")||"{}");

function save(){
localStorage.setItem("classement",JSON.stringify(classement));
}

/* BARÈME WZ */
function calc(kills,pos){

let mult=1;

if(pos==1) mult=1.6;
else if(pos<=5) mult=1.4;
else if(pos<=10) mult=1.2;
else mult=1;

return Math.round(kills*mult);
}

/* RESULT */
function addResult(team,kills,pos){

if(!classement[team]){
classement[team]={total:0};
}

classement[team].total += calc(kills,pos);

save();
}

/* GENERATE 17 TEAMS */
function generate(){

let players=getPlayers();
let size=3;

let container=document.getElementById("teams");
container.innerHTML="";

for(let i=1;i<=17;i++){

let teamPlayers=players.slice((i-1)*size,i*size);

let html="";

teamPlayers.forEach(p=>{
html+=`<span class="player">${p}</span>`;
});

let score = classement["TEAM "+i]?.total || 0;

container.innerHTML+=`
<div class="team">
<span class="title">TEAM ${i}</span>
<span class="score">${score} pts</span>
<br>
${html}
</div>
`;
}

}

/* CLEAR */
function clearTeams(){
document.getElementById("teams").innerHTML="";
}

/* 💣 STATS CASH */
function updateStats(){

let players=getPlayers();

let count = players.length;
let entry = count * 10;
let prize = entry;

document.getElementById("countPlayers").innerText = count;
document.getElementById("entryMoney").innerText = entry + "€";
document.getElementById("prizePool").innerText = prize + "€";

}

setInterval(updateStats,1000);

update();

</script>

</body>
</html>
