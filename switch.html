<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRON x XTOZZE TOURNOI</title>

<style>

body{
background:#050505;
color:white;
font-family:Arial;
padding:15px;
}

h1{
text-align:center;
color:#ff3030;
text-shadow:0 0 15px red;
margin-bottom:15px;
}

#timer{
text-align:center;
font-size:70px;
font-weight:bold;
color:#ff3030;
margin:10px 0;
}

.center{
text-align:center;
margin-bottom:15px;
}

button{
background:#ff3030;
color:white;
border:none;
padding:8px 12px;
margin:3px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:0.85;
}

.teams{
margin-top:15px;
}

.team{
background:#111;
border:1px solid #ff3030;
border-radius:8px;
padding:8px;
margin-bottom:8px;
font-size:15px;
}

.team span{
color:#ff3030;
font-weight:bold;
}

</style>
</head>

<body>

<h1>🔥 IRON x XTOZZE TOURNOI 🔥</h1>

<div id="timer">00:00</div>

<div class="center">

<!-- TIMER BUTTONS -->
<button onclick="startTimer()">START</button>
<button onclick="pauseTimer()">PAUSE</button>
<button onclick="resetTimer()">STOP</button>

<br>

<button onclick="addTime(5)">+5s</button>
<button onclick="addTime(10)">+10s</button>
<button onclick="addTime(20)">+20s</button>
<button onclick="addTime(30)">+30s</button>
<button onclick="addTime(60)">+1m</button>
<button onclick="addTime(120)">+2m</button>

<br><br>

<!-- TEAM BUTTONS -->
<button onclick="generateTeams()">🎲 Créer équipes</button>
<button onclick="clearTeams()">🗑 Supprimer équipes</button>

</div>

<div id="teams"></div>

<script>

let totalSeconds = 0;
let interval = null;

function updateTimer(){

let m = Math.floor(totalSeconds / 60);
let s = totalSeconds % 60;

document.getElementById("timer").innerText =
String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");

}

function startTimer(){

if(interval) return;

interval = setInterval(()=>{

if(totalSeconds > 0){
totalSeconds--;
updateTimer();
}

},1000);

}

function pauseTimer(){
clearInterval(interval);
interval = null;
}

function resetTimer(){
pauseTimer();
totalSeconds = 0;
updateTimer();
}

function addTime(sec){
totalSeconds += sec;
updateTimer();
}

function generateTeams(){

const container = document.getElementById("teams");
container.innerHTML = "";

for(let i=1;i<=17;i++){

container.innerHTML += `
<div class="team">
<span>TEAM ${i}</span>
 | Joueur 1
 | Joueur 2
 | Joueur 3
</div>
`;

}

}

function clearTeams(){
document.getElementById("teams").innerHTML = "";
}

updateTimer();

</script>

</body>
</html>
