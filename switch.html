```html
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRON x XTOZZE TOURNOI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050505;
color:white;
padding:15px;
}

h1{
text-align:center;
color:#ff3030;
margin-bottom:20px;
text-shadow:0 0 15px red;
}

.top{
text-align:center;
margin-bottom:20px;
}

#timer{
font-size:70px;
font-weight:bold;
color:#ff3030;
margin:10px 0;
}

button{
background:#ff3030;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
margin:3px;
font-weight:bold;
}

button:hover{
opacity:.85;
}

.teams{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
}

.team{
background:#111;
border:1px solid #ff3030;
border-radius:8px;
padding:5px;
min-height:60px;
}

.team h3{
text-align:center;
color:#ff3030;
font-size:14px;
margin-bottom:2px;
}

.player{
text-align:center;
font-size:12px;
padding:1px;
}

@media(max-width:1000px){
.teams{
grid-template-columns:repeat(3,1fr);
}
}

@media(max-width:700px){
.teams{
grid-template-columns:repeat(2,1fr);
}
}
</style>
</head>

<body>

<h1>🔥 IRON x XTOZZE TOURNOI 🔥</h1>

<div class="top">

<div id="timer">00:00</div>

<button onclick="startTimer()">START</button>
<button onclick="pauseTimer()">PAUSE</button>
<button onclick="resetTimer()">STOP</button>

<br><br>

<button onclick="addTime(5)">+5s</button>
<button onclick="addTime(10)">+10s</button>
<button onclick="addTime(20)">+20s</button>
<button onclick="addTime(30)">+30s</button>

<br>

<button onclick="addTime(60)">+1m</button>
<button onclick="addTime(120)">+2m</button>

<br><br>

<button onclick="generateTeams()">🎲 Générer équipes</button>
<button onclick="clearTeams()">🗑 Supprimer équipes</button>

</div>

<div id="teams" class="teams"></div>

<script>

let totalSeconds = 0;
let interval = null;

function updateTimer(){
const m = Math.floor(totalSeconds/60);
const s = totalSeconds%60;

document.getElementById("timer").innerText =
String(m).padStart(2,"0")+":"+
String(s).padStart(2,"0");
}

function startTimer(){
if(interval) return;

interval = setInterval(()=>{
if(totalSeconds>0){
totalSeconds--;
updateTimer();
}
},1000);
}

function pauseTimer(){
clearInterval(interval);
interval = null;
}

function resetTimer(){
pauseTimer();
totalSeconds = 0;
updateTimer();
}

function addTime(sec){
totalSeconds += sec;
updateTimer();
}

function clearTeams(){
document.getElementById("teams").innerHTML = "";
}

function generateTeams(){

const container =
document.getElementById("teams");

container.innerHTML = "";

for(let i=1;i<=17;i++){

container.innerHTML += `
<div class="team">
<h3>TEAM ${i}</h3>
<div class="player">-</div>
<div class="player">-</div>
<div class="player">-</div>
</div>
`;

}

}

updateTimer();
generateTeams();

</script>

</body>
</html>
```
