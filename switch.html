<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SWITCH TOURNOI</title>

<style>

body{
background:#050505;
color:white;
font-family:Arial;
padding:15px;
}

h1{
text-align:center;
color:#ff3030;
text-shadow:0 0 10px red;
}

#timer{
text-align:center;
font-size:60px;
color:#ff3030;
margin:10px;
font-weight:bold;
}

.center{
text-align:center;
}

button{
background:#ff3030;
color:white;
border:none;
padding:8px 12px;
margin:3px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:0.85;
}

.team{
background:#111;
border:1px solid #ff3030;
border-radius:8px;
padding:10px;
margin-bottom:8px;
}

.title{
color:#ff3030;
font-weight:bold;
margin-bottom:5px;
}

.player{
display:inline-block;
margin-right:8px;
opacity:0.9;
}

</style>

</head>

<body>

<h1>🔥 IRON x XTOZZE TOURNOI 🔥</h1>

<div id="timer">00:00</div>

<div class="center">

<button onclick="start()">START</button>
<button onclick="pause()">PAUSE</button>
<button onclick="reset()">STOP</button>

<br>

<button onclick="add(10)">+10s</button>
<button onclick="add(30)">+30s</button>
<button onclick="add(60)">+1m</button>

<br><br>

<button onclick="generate()">🎲 GÉNÉRER ÉQUIPES</button>
<button onclick="clearTeams()">🗑 SUPPRIMER ÉQUIPES</button>

</div>

<br>

<div id="teams"></div>

<script>

let time = 0;
let interval = null;

/* TIMER */
function update(){
let m = Math.floor(time/60);
let s = time%60;

document.getElementById("timer").innerText =
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}

function start(){
if(interval) return;
interval = setInterval(()=>{
if(time>0){
time--;
update();
}
},1000);
}

function pause(){
clearInterval(interval);
interval = null;
}

function reset(){
pause();
time = 0;
update();
}

function add(sec){
time += sec;
update();
}

/* PLAYERS FROM INSCRIPTIONS */
function getPlayers(){
return JSON.parse(localStorage.getItem("players") || "[]");
}

/* GENERATE TEAMS (MAX 5) */
function generate(){

let players = getPlayers();
let size = 3;

let container = document.getElementById("teams");
container.innerHTML = "";

for(let i=0;i<5;i++){

let teamPlayers = players.slice(i*size,(i+1)*size);

let html = "";

teamPlayers.forEach(p=>{
html += `<span class="player">${p}</span>`;
});

container.innerHTML += `
<div class="team">
<div class="title">TEAM ${i+1}</div>
${html}
</div>
`;

}

}

/* CLEAR */
function clearTeams(){
document.getElementById("teams").innerHTML = "";
}

update();

</script>

</body>
</html>
