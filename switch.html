<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TOURNOI WARZONE</title>

<style>

body{
background:#050505;
color:white;
font-family:Arial;
padding:15px;
}

h1{
text-align:center;
color:#ff3030;
text-shadow:0 0 10px red;
}

#timer{
text-align:center;
font-size:60px;
font-weight:bold;
color:#ff3030;
margin:10px;
}

.center{
text-align:center;
}

button{
background:#ff3030;
color:white;
border:none;
padding:8px 12px;
margin:3px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

input,select{
padding:8px;
margin:5px;
border-radius:6px;
border:none;
text-align:center;
}

.team{
background:#111;
border:1px solid #ff3030;
padding:10px;
margin-bottom:8px;
border-radius:8px;
}

.title{
color:#ff3030;
font-weight:bold;
}

.score{
float:right;
color:#00ff00;
font-weight:bold;
}

</style>

</head>

<body>

<h1>🔥 IRON x XTOZZE TOURNOI 🔥</h1>

<div id="timer">00:00</div>

<div class="center">

<button onclick="start()">START</button>
<button onclick="pause()">PAUSE</button>
<button onclick="reset()">STOP</button>

<br>

<button onclick="add(10)">+10s</button>
<button onclick="add(30)">+30s</button>
<button onclick="add(60)">+1m</button>

</div>

<br>

<!-- GAME INPUT -->
<div class="center">

<select id="team">
<option>TEAM 1</option>
<option>TEAM 2</option>
<option>TEAM 3</option>
<option>TEAM 4</option>
<option>TEAM 5</option>
<option>TEAM 6</option>
<option>TEAM 7</option>
<option>TEAM 8</option>
<option>TEAM 9</option>
<option>TEAM 10</option>
<option>TEAM 11</option>
<option>TEAM 12</option>
<option>TEAM 13</option>
<option>TEAM 14</option>
<option>TEAM 15</option>
<option>TEAM 16</option>
<option>TEAM 17</option>
</select>

<input id="kills" type="number" placeholder="Kills">
<input id="pos" type="number" placeholder="Position">

<button onclick="submitGame()">✔ VALIDER GAME</button>

</div>

<br>

<div id="teams"></div>

<script>

let time=0;
let interval=null;

/* TIMER */
function update(){
let m=Math.floor(time/60);
let s=time%60;
document.getElementById("timer").innerText=
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}

function start(){
if(interval)return;
interval=setInterval(()=>{
if(time>0){time--;update();}
},1000);
}

function pause(){
clearInterval(interval);
interval=null;
}

function reset(){
pause();
time=0;
update();
}

function add(t){
time+=t;
update();
}

/* STORAGE */
let classement = JSON.parse(localStorage.getItem("classement")||"{}");

function save(){
localStorage.setItem("classement",JSON.stringify(classement));
}

/* BARÈME WZ FINAL */
function calc(kills,pos){

let mult=1;

if(pos==1) mult=1.6;
else if(pos<=5) mult=1.4;
else if(pos<=10) mult=1.2;
else mult=1;

return Math.round(kills*mult);
}

/* SUBMIT GAME */
function submitGame(){

let team=document.getElementById("team").value;
let kills=Number(document.getElementById("kills").value);
let pos=Number(document.getElementById("pos").value);

if(!kills || !pos) return alert("Remplis tout");

if(!classement[team]){
classement[team]={total:0};
}

classement[team].total += calc(kills,pos);

save();

alert("GAME VALIDÉE ✔");

render();

}

/* DISPLAY TEAMS */
function render(){

let container=document.getElementById("teams");
container.innerHTML="";

for(let i=1;i<=5;i++){

let team="TEAM "+i;
let score=classement[team]?.total || 0;

container.innerHTML+=`
<div class="team">
<span class="title">${team}</span>
<span class="score">${score} pts</span>
</div>
`;
}

}

render();
update();

</script>

</body>
</html>
