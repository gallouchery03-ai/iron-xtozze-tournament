<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Switch - Xtozze x Iron x Madness</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050505;
color:white;
padding:15px;
}

h1{
text-align:center;
color:#ff3030;
margin-bottom:20px;
text-shadow:0 0 15px red;
}

.top{
text-align:center;
margin-bottom:25px;
}

#timer{
font-size:80px;
font-weight:bold;
color:#ff3030;
margin:15px 0;
}

button{
background:#ff3030;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
margin:4px;
font-weight:bold;
}

button:hover{
opacity:.85;
}

select{
background:#111;
color:white;
border:1px solid #ff3030;
padding:10px;
border-radius:8px;
margin-top:10px;
}

.teams{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.team{
background:#111;
border:1px solid #ff3030;
border-radius:10px;
padding:8px;
min-height:90px;
}

.team h3{
text-align:center;
color:#ff3030;
margin-bottom:5px;
font-size:18px;
}

.player{
text-align:center;
font-size:14px;
padding:2px;
}

@media(max-width:900px){
.teams{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<h1>🔥 XTOZZE x IRON x MADNESS 🔥</h1>

<div class="top">

<div id="timer">00:00</div>

<button onclick="startTimer()">START</button>
<button onclick="pauseTimer()">PAUSE</button>
<button onclick="resetTimer()">STOP</button>

<br><br>

<button onclick="addTime(5)">+5s</button>
<button onclick="addTime(10)">+10s</button>
<button onclick="addTime(20)">+20s</button>
<button onclick="addTime(30)">+30s</button>

<br>

<button onclick="addTime(60)">+1m</button>
<button onclick="addTime(120)">+2m</button>

<br><br>

<select id="teamSize">
<option value="2">DUO</option>
<option value="3" selected>TRIO</option>
<option value="4">QUAD</option>
</select>

<br><br>

<button onclick="generateTeams()">
🎲 Générer équipes
</button>

<button onclick="clearTeams()">
🗑 Supprimer équipes
</button>

</div>

<div id="teams" class="teams"></div>

<script>

let totalSeconds = 0;
let interval = null;

function updateTimer(){

const m = Math.floor(totalSeconds/60);
const s = totalSeconds%60;

document.getElementById("timer").innerText =
String(m).padStart(2,"0")+":"+
String(s).padStart(2,"0");

}

function startTimer(){

if(interval) return;

interval = setInterval(()=>{

if(totalSeconds>0){
totalSeconds--;
updateTimer();
}

},1000);

}

function pauseTimer(){

clearInterval(interval);
interval = null;

}

function resetTimer(){

pauseTimer();
totalSeconds = 0;
updateTimer();

}

function addTime(sec){

totalSeconds += sec;
updateTimer();

}

function clearTeams(){

document.getElementById("teams").innerHTML = "";

}

function generateTeams(){

const container =
document.getElementById("teams");

container.innerHTML = "";

const size =
parseInt(document.getElementById("teamSize").value);

for(let i=1;i<=17;i++){

let players = "";

for(let j=0;j<size;j++){
players += '<div class="player">-</div>';
}

container.innerHTML += `
<div class="team">
<h3>TEAM ${i}</h3>
${players}
</div>
`;

}

}

updateTimer();
generateTeams();

</script>

</body>
</html>
