<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050505;
color:white;
padding:20px;
}

.menu{
display:flex;
justify-content:center;
gap:15px;
margin-bottom:25px;
}

.menu a{
text-decoration:none;
color:white;
background:#111;
border:1px solid red;
padding:10px 15px;
border-radius:8px;
font-weight:bold;
}

.menu a:hover{
background:red;
}

.panel{
border:2px solid red;
border-radius:15px;
padding:20px;
margin-bottom:30px;
background:#0f0f0f;
}

h1{
text-align:center;
color:red;
margin-bottom:20px;
}

.timer{
font-size:90px;
font-weight:bold;
color:red;
text-align:center;
margin:20px 0;
}

.center{
text-align:center;
}

button{
background:red;
color:white;
border:none;
padding:10px 15px;
margin:5px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:.85;
}

select{
padding:10px;
background:#111;
color:white;
border:1px solid red;
border-radius:8px;
margin-top:10px;
}

.teams{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-top:30px;
}

.team{
background:#111;
border:1px solid red;
border-radius:12px;
padding:15px;
min-height:120px;
}

.team h3{
text-align:center;

margin-bottom:10px;

.player{

<div class="panel">

<h1>🎮 SWITCH</h1>

<div id="timer" class="timer">
00:00
</div>

<div class="center">

<button onclick="startTimer()">▶ START</button>
<button onclick="pauseTimer()">⏸ PAUSE</button>
<button onclick="resetTimer()">⏹ STOP</button>

<br><br>

<button onclick="addTime(5)">+5s</button>
<button onclick="addTime(10)">+10s</button>
<button onclick="addTime(20)">+20s</button>
<button onclick="addTime(30)">+30s</button>

<br>

<button onclick="addTime(60)">+1m</button>
<button onclick="addTime(120)">+2m</button>

<br><br>

<h3>Taille des équipes</h3>

<select id="teamSize">
<option value="2">Duo</option>
<option value="3" selected>Trio</option>
<option value="4">Quad</option>
</select>

<br><br>

<button onclick="generateTeams()">
🎲 Générer équipes
</button>

<button onclick="clearTeams()">
🗑 Supprimer équipes
</button>

</div>

</div>

<div id="teams" class="teams"></div>
