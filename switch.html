<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SWITCH TOURNOI</title>

<style>

body{
background:#050505;
color:white;
font-family:Arial;
padding:15px;
}

h1{
text-align:center;
color:#ff3030;
text-shadow:0 0 10px red;
}

#timer{
text-align:center;
font-size:60px;
font-weight:bold;
color:#ff3030;
margin:10px;
}

.center{
text-align:center;
}

button{
background:#ff3030;
color:white;
border:none;
padding:8px 12px;
margin:3px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:0.85;
}

.team{
background:#111;
border:1px solid #ff3030;
padding:10px;
margin-bottom:8px;
border-radius:8px;
}

.title{
color:#ff3030;
font-weight:bold;
}

.player{
display:inline-block;
margin-right:8px;
opacity:0.9;
}

.score{
float:right;
color:#00ff00;
font-weight:bold;
}

</style>

</head>

<body>

<h1>🔥 IRON x XTOZZE TOURNOI 🔥</h1>

<div id="timer">00:00</div>

<div class="center">

<!-- TIMER -->
<button onclick="start()">START</button>
<button onclick="pause()">PAUSE</button>
<button onclick="reset()">STOP</button>

<br>

<button onclick="add(10)">+10s</button>
<button onclick="add(30)">+30s</button>
<button onclick="add(60)">+1m</button>

<br><br>

<!-- TEAM BUTTONS -->
<button onclick="generate()">🎲 CRÉER ÉQUIPES</button>
<button onclick="clearTeams()">🗑 SUPPRIMER ÉQUIPES</button>

</div>

<br>

<div id="teams"></div>

<script>

/* TIMER */
let time=0;
let interval=null;

function update(){
let m=Math.floor(time/60);
let s=time%60;
document.getElementById("timer").innerText=
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}

function start(){
if(interval)return;
interval=setInterval(()=>{
if(time>0){
time--;
update();
}
},1000);
}

function pause(){
clearInterval(interval);
interval=null;
}

function reset(){
pause();
time=0;
update();
}

function add(sec){
time+=sec;
update();
}

/* PLAYERS */
function getPlayers(){
return JSON.parse(localStorage.getItem("players")||"[]");
}

/* CLASSEMENT */
let classement = JSON.parse(localStorage.getItem("classement")||"{}");

function save(){
localStorage.setItem("classement",JSON.stringify(classement));
}

/* BARÈME WZ */
function calc(kills,pos){

let mult=1;

if(pos==1) mult=1.6;
else if(pos<=5) mult=1.4;
else if(pos<=10) mult=1.2;
else mult=1;

return Math.round(kills*mult);
}

/* ADD RESULT (option future) */
function addResult(team,kills,pos){

if(!classement[team]){
classement[team]={total:0};
}

classement[team].total += calc(kills,pos);

save();
}

/* GENERATE 17 TEAMS */
function generate(){

let players=getPlayers();
let size=3;

let container=document.getElementById("teams");
container.innerHTML="";

for(let i=1;i<=17;i++){

let teamPlayers=players.slice((i-1)*size,i*size);

let html="";

teamPlayers.forEach(p=>{
html+=`<span class="player">${p}</span>`;
});

let score = classement["TEAM "+i]?.total || 0;

container.innerHTML+=`
<div class="team">
<span class="title">TEAM ${i}</span>
<span class="score">${score} pts</span>
<br>
${html}
</div>
`;
}

}

/* CLEAR */
function clearTeams(){
document.getElementById("teams").innerHTML="";
}

/* INIT */
update();

</script>

</body>
</html>
