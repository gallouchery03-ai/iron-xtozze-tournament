<body>

<h1>🔥 IRON x XTOZZE TOURNOI 🔥</h1>

<div class="top">

<div id="timer">00:00</div>
<div style="text-align:center;margin:10px;">
<button onclick="startTimer()">START</button>
<button onclick="pauseTimer()">PAUSE</button>
<button onclick="resetTimer()">STOP</button>
</div>

<div style="text-align:center;margin-bottom:10px;">
<button onclick="addTime(5)">+5s</button>
<button onclick="addTime(10)">+10s</button>
<button onclick="addTime(20)">+20s</button>
<button onclick="addTime(30)">+30s</button>
<button onclick="addTime(60)">+1m</button>
<button onclick="addTime(120)">+2m</button>
</div>

<button onclick="startTimer()">START</button>
<button onclick="pauseTimer()">PAUSE</button>
<button onclick="resetTimer()">STOP</button>

<br><br>

<button onclick="addTime(5)">+5s</button>
<button onclick="addTime(10)">+10s</button>
<button onclick="addTime(20)">+20s</button>
<button onclick="addTime(30)">+30s</button>

<br>

<button onclick="addTime(60)">+1m</button>
<button onclick="addTime(120)">+2m</button>

</div>

<div id="teams"></div>

<script>

let totalSeconds = 0;
let interval = null;

function updateTimer(){

const m = Math.floor(totalSeconds/60);
const s = totalSeconds%60;

document.getElementById("timer").innerText =
String(m).padStart(2,"0")+":"+
String(s).padStart(2,"0");

}

function startTimer(){

if(interval) return;

interval = setInterval(()=>{

if(totalSeconds>0){
totalSeconds--;
updateTimer();
}

},1000);

}

function pauseTimer(){
clearInterval(interval);
interval=null;
}

function resetTimer(){
pauseTimer();
totalSeconds=0;
updateTimer();
}

function addTime(sec){
totalSeconds += sec;
updateTimer();
}

function generateTeams(){

const container = document.getElementById("teams");

container.innerHTML = "";

for(let i = 1; i <= 17; i++){

container.innerHTML += `
<div class="team">
<h3>TEAM ${i}</h3>
<div class="player">-</div>
<div class="player">-</div>
<div class="player">-</div>
</div>
`;

}

}

updateTimer();
generateTeams();

</script>

</body>
</html>
