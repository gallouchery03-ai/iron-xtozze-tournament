<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Switch - Iron x Xtozze</title>

<style>
body{
margin:0;
background:#050505;
color:white;
font-family:Arial,sans-serif;
}

.container{
display:grid;
grid-template-columns:300px 1fr 350px;
gap:20px;
padding:20px;
}

.panel{
background:#111;
border:2px solid red;
border-radius:12px;
padding:15px;
}

h2{
color:red;
margin-top:0;
}

#timer{
font-size:60px;
text-align:center;
color:red;
font-weight:bold;
}

button{
background:red;
color:white;
border:none;
padding:8px 12px;
margin:4px;
border-radius:6px;
cursor:pointer;
}

input{
width:100%;
padding:8px;
margin:4px 0;
background:#1a1a1a;
border:1px solid #333;
color:white;
}

.team{
border:1px solid #333;
padding:10px;
margin-bottom:10px;
border-radius:8px;
}

.teams{
max-height:700px;
overflow:auto;
}
</style>
</head>

<body>

<div class="container">

<!-- JOUEURS -->
<div class="panel">

<h2>JOUEURS</h2>

<input id="playerName" placeholder="Nom du joueur">

<button>Ajouter joueur</button>

<hr>

<div id="playersList">

</div>

</div>

<!-- CENTRE -->
<div class="panel">

<h2>TIMER</h2>

<div id="timer">00:00</div>

<div style="text-align:center;">

<button>START</button>
<button>PAUSE</button>
<button>STOP</button>

<br>

<button>+5s</button>
<button>+10s</button>
<button>+20s</button>
<button>+30s</button>

<br>

<button>+1m</button>
<button>+2m</button>

</div>

<hr>

<h2>INFOS</h2>

<p>Inscrits : 0</p>
<p>Équipes : 17</p>
<p>Top Killer : -</p>
<p>Cagnotte : 0 €</p>

<hr>

<button>Créer équipes</button>
<button>Supprimer équipes</button>

</div>

<!-- EQUIPES -->
<div class="panel">

<h2>EQUIPES</h2>

<div class="teams">

<div class="team">
<h3>TEAM 1</h3>
<p>-</p>
<p>-</p>
<p>-</p>
</div>

<div class="team">
<h3>TEAM 2</h3>
<p>-</p>
<p>-</p>
<p>-</p>
</div>

<!-- jusqu'à TEAM 17 -->

</div>

</div>

</div>

</body>
</html>
