<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SWITCH TOURNOI</title>

<style>

body{
background:#050505;
color:white;
font-family:Arial;
padding:15px;
}

h1{
text-align:center;
color:#ff3030;
text-shadow:0 0 10px red;
}

#timer{
text-align:center;
font-size:60px;
font-weight:bold;
color:#ff3030;
margin:10px;
}

.center{
text-align:center;
}

button{
background:#ff3030;
color:white;
border:none;
padding:8px 12px;
margin:3px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:0.85;
}

/* TEAMS */
#teams{
margin-top:20px;
}

.team{
background:#111;
border:1px solid #ff3030;
border-radius:8px;
padding:10px;
margin-bottom:8px;
}

.title{
color:#ff3030;
font-weight:bold;
margin-bottom:5px;
}

.player{
display:inline-block;
margin-right:8px;
opacity:0.9;
}

</style>

</head>

<body>

<h1>🔥 IRON x XTOZZE TOURNOI 🔥</h1>

<div id="timer">00:00</div>

<div class="center">

<button onclick="start()">START</button>
<button onclick="pause()">PAUSE</button>
<button onclick="reset()">STOP</button>

<br>

<button onclick="add(10)">+10s</button>
<button onclick="add(30)">+30s</button>
<button onclick="add(60)">+1m</button>

<br><br>

<button onclick="generate()">🎲 GÉNÉRER ÉQUIPES</button>
<button onclick="clearTeams()">🗑 SUPPRIMER ÉQUIPES</button>

<br><br>

<button onclick="sendTest()">💣 TEST GAME → CLASSEMENT</button>

</div>

<div id="teams"></div>

<script>

/* TIMER */
let time=0;
let interval=null;

function update(){
let m=Math.floor(time/60);
let s=time%60;
document.getElementById("timer").innerText=
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}

function start(){
if(interval)return;
interval=setInterval(()=>{
if(time>0){time--;update();}
},1000);
}

function pause(){
clearInterval(interval);
interval=null;
}

function reset(){
pause();
time=0;
update();
}

function add(sec){
time+=sec;
update();
}

/* PLAYERS */
function getPlayers(){
return JSON.parse(localStorage.getItem("players")||"[]");
}

/* CLASSEMENT STORAGE */
let classement = JSON.parse(localStorage.getItem("classement")||"{}");

/* SAVE */
function saveClassement(){
localStorage.setItem("classement",JSON.stringify(classement));
}

/* BARÈME WZ */
function calcPoints(kills,position){

let mult=1;

if(position==1) mult=1.6;
else if(position<=5) mult=1.4;
else if(position<=10) mult=1.2;

return Math.round(kills*mult);
}

/* ADD RESULT */
function addResult(team,kills,position){

if(!classement[team]){
classement[team]={M1:0,M2:0,M3:0,M4:0,M5:0,M6:0,M7:0,M8:0,M9:0,M10:0};
}

let mapCount = Object.keys(classement[team]).length;
let map="M"+(mapCount+1);

classement[team][map]=calcPoints(kills,position);

saveClassement();
}

/* TEST */
function sendTest(){
addResult("TEAM 1",10,1);
addResult("TEAM 2",8,4);
addResult("TEAM 3",5,12);
alert("Game envoyée au classement !");
}

/* GENERATE TEAMS */
function generate(){

let players=getPlayers();
let size=3;

let container=document.getElementById("teams");
container.innerHTML="";

for(let i=0;i<17;i++){

let teamPlayers=players.slice(i*size,(i+1)*size);

let html="";

teamPlayers.forEach(p=>{
html+=`<span class="player">${p}</span>`;
});

container.innerHTML+=`
<div class="team">
<div class="title">TEAM ${i+1}</div>
${html}
</div>
`;
}

}

function clearTeams(){
document.getElementById("teams").innerHTML="";
}

update();

</script>

</body>
</html>
