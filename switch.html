<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Switch Tournament</title>

<style>
body{
background:#050505;
color:white;
font-family:Arial;
padding:15px;
}

h1{
text-align:center;
color:#ff3030;
}

#timer{
text-align:center;
font-size:60px;
color:#ff3030;
margin:10px;
}

button{
background:#ff3030;
color:white;
border:none;
padding:8px 12px;
margin:3px;
border-radius:8px;
cursor:pointer;
}

.team{
background:#111;
border:1px solid #ff3030;
padding:10px;
margin-bottom:8px;
border-radius:8px;
}

.team-title{
color:#ff3030;
font-weight:bold;
}

.player{
display:inline-block;
margin-right:10px;
opacity:0.9;
}
</style>
</head>

<body>

<h1>🔥 IRON x XTOZZE TOURNOI 🔥</h1>

<div id="timer">00:00</div>

<div style="text-align:center;">
<button onclick="startTimer()">START</button>
<button onclick="pauseTimer()">PAUSE</button>
<button onclick="resetTimer()">STOP</button>
<br>
<button onclick="addTime(10)">+10s</button>
<button onclick="addTime(30)">+30s</button>
<button onclick="addTime(60)">+1m</button>
</div>

<br>

<button onclick="generateTeams()">🎲 Générer équipes</button>

<div id="teams"></div>

<script>

let time=0;
let interval=null;

function update(){
let m=Math.floor(time/60);
let s=time%60;
document.getElementById("timer").innerText=
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}

function startTimer(){
if(interval)return;
interval=setInterval(()=>{
if(time>0){time--;update();}
},1000);
}

function pauseTimer(){
clearInterval(interval);
interval=null;
}

function resetTimer(){
pauseTimer();
time=0;
update();
}

function addTime(t){
time+=t;
update();
}

/* 🔥 RÉCUP JOUEURS */
function getPlayers(){
return JSON.parse(localStorage.getItem("players")||"[]");
}

/* 🔥 CRÉER ÉQUIPES */
function generateTeams(){

let players=getPlayers();

const container=document.getElementById("teams");
container.innerHTML="";

let teamSize=3;
let teamCount=Math.ceil(players.length/teamSize);

for(let i=0;i<teamCount;i++){

let teamPlayers=players.slice(i*teamSize,(i+1)*teamSize);

let html="";

teamPlayers.forEach(p=>{
html+=`<span class="player">${p}</span>`;
});

container.innerHTML+=`
<div class="team">
<div class="team-title">TEAM ${i+1}</div>
${html}
</div>
`;
}

}

update();

</script>

</body>
</html>
