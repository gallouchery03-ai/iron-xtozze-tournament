<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SWITCH TOURNOI</title>

<style>

body{
background:#050505;
color:white;
font-family:Arial;
padding:15px;
}

h1{
text-align:center;
color:#ff3030;
text-shadow:0 0 10px red;
}

#timer{
text-align:center;
font-size:60px;
font-weight:bold;
color:#ff3030;
margin:10px;
}

.center{
text-align:center;
}

button{
background:#ff3030;
color:white;
border:none;
padding:8px 12px;
margin:3px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:0.85;
}

/* 🔥 GRID 4 PAR LIGNE */
#teams{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:20px;
}

/* TEAM CLEAN */
.team{
background:#111;
border:1px solid #ff3030;
border-radius:8px;
padding:10px;
text-align:center;
}

.team strong{
color:#ff3030;
display:block;
margin-bottom:5px;
}

.player{
display:block;
opacity:0.9;
font-size:14px;
margin:2px 0;
}

</style>

</head>

<body>

<h1>🔥 IRON x XTOZZE TOURNOI 🔥</h1>

<div id="timer">00:00</div>

<div class="center">

<button onclick="start()">START</button>
<button onclick="pause()">PAUSE</button>
<button onclick="reset()">STOP</button>

<br>

<button onclick="add(10)">+10s</button>
<button onclick="add(30)">+30s</button>
<button onclick="add(60)">+1m</button>

<br><br>

<button onclick="generate()">🎲 CRÉER ÉQUIPES</button>
<button onclick="clearTeams()">🗑 SUPPRIMER ÉQUIPES</button>

</div>

<div id="teams"></div>

<script>

/* TIMER */
let time=0;
let interval=null;

function update(){
let m=Math.floor(time/60);
let s=time%60;
document.getElementById("timer").innerText=
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}

function start(){
if(interval)return;
interval=setInterval(()=>{
if(time>0){time--;update();}
},1000);
}

function pause(){
clearInterval(interval);
interval=null;
}

function reset(){
pause();
time=0;
update();
}

function add(sec){
time+=sec;
update();
}

/* PLAYERS */
function getPlayers(){
return JSON.parse(localStorage.getItem("players")||"[]");
}

/* 🔥 GENERATE 16 TEAMS CLEAN */
function generate(){

let players=getPlayers();
let size=3;

let container=document.getElementById("teams");
container.innerHTML="";

for(let i=0;i<16;i++){

let teamPlayers=players.slice(i*size,(i+1)*size);

let html="";

teamPlayers.forEach(p=>{
html+=`<div class="player">${p}</div>`;
});

container.innerHTML+=`
<div class="team">
<strong>TEAM ${i+1}</strong>
${html}
</div>
`;
}

}

function clearTeams(){
document.getElementById("teams").innerHTML="";
}

update();

</script>

</body>
</html>
