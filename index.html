<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Tournoi Dashboard</title>

<style>

body{
margin:0;
background:#0a0a0a;
color:white;
font-family:Arial;
}

header{
padding:20px;
text-align:center;
background:#111;
border-bottom:2px solid red;
}

.cards{
display:flex;
justify-content:center;
gap:15px;
padding:20px;
flex-wrap:wrap;
}

.card{
background:#111;
border:1px solid red;
padding:15px;

min-width:150px;

}

a{
color:white;
text-decoration:none;
}

.menu{
text-align:center;
margin:10px;
}

.menu a{
margin:10px;
padding:8px 12px;
background:#111;
border:1px solid red;
border-radius:6px;
display:inline-block;
}

</style>
</head>

<body>

<header>
<h1>🔥 TOURNOI WARZONE 🔥</h1>
<p>Dashboard simple</p>
</header>

<div class="menu">
<a href="switch.html">🎮 Teams</a>
<a href="leaderboard.html">🏆 Classement</a>
</div>

<div class="cards">

<div class="card">
Joueurs
<div id="players">0</div>
</div>

<div class="card">
Teams
<div>17</div>
</div>

<div class="card">
Status
<div>LIVE</div>
</div>

</div>

<script>

let p = JSON.parse(localStorage.getItem("players")||"[]");
document.getElementById("players").innerText = p.length;

</script>

</html>
