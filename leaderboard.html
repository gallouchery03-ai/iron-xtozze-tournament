<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Leaderboard</title>

<style>
body{background:#050505;color:white;font-family:Arial;padding:20px}
table{width:100%;border-collapse:collapse}
td,th{border:1px solid red;padding:8px;text-align:center}
th{background:#111}
</style>

</head>

<body>

<h1>🏆 LEADERBOARD</h1>

<table>
<tr><th>TEAM</th><th>POINTS</th></tr>
<tbody id="t"></tbody>
</table>

<script>

let data=JSON.parse(localStorage.getItem("classement")||"{}");

function get(team){
return data[team]?.total||0;
}

function load(){

let t=document.getElementById("t");
t.innerHTML="";

for(let i=1;i<=17;i++){
t.innerHTML+=`
<tr>
<td>TEAM ${i}</td>
<td>${get("TEAM "+i)}</td>
</tr>
`;
}

}

load();

setInterval(load,2000);

</script>

</body>
</html>
