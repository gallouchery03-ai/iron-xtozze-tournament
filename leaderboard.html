<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Classement Pro</title>

<style>

body{
margin:0;
background:radial-gradient(circle,#1a0000,#050505);
color:white;
font-family:Arial;
}

h1{
text-align:center;
color:#ff3030;
padding:15px;
}

table{
width:90%;
margin:auto;
border-collapse:collapse;
background:rgba(0,0,0,0.7);
border-radius:10px;
overflow:hidden;
}

th,td{
padding:12px;
border-bottom:1px solid red;
text-align:center;
}

th{
background:#111;
color:#ff3030;
}

.menu{
text-align:center;
padding:10px;
}

.menu a{
color:white;
text-decoration:none;
padding:10px;
background:#111;
border:1px solid red;
border-radius:8px;
margin:5px;
display:inline-block;
}

</style>

</head>

<body>

<h1>🏆 CLASSEMENT PRO</h1>

<div class="menu">
<a href="index.html">🏠 Accueil</a>
<a href="switch.html">🎮 Teams</a>
</div>

<table>
<tr>
<th>TEAM</th>
<th>POINTS</th>
</tr>

<tbody id="t"></tbody>
</table>

<script>

let data=JSON.parse(localStorage.getItem("classement")||"{}");

function get(t){
return data[t]?.total||0;
}

function load(){

let t=document.getElementById("t");
t.innerHTML="";

for(let i=1;i<=17;i++){

t.innerHTML+=`
<tr>
<td>TEAM ${i}</td>
<td>${get("TEAM "+i)}</td>
</tr>
`;
}

}

load();

</script>

</body>
</html>
