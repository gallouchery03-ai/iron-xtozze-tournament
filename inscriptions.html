<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Inscriptions</title>

<style>
body{
background:#050505;
color:white;
font-family:Arial;
padding:20px;
}

h1{
text-align:center;
color:#ff3030;
}

input{
width:100%;
padding:10px;
margin:5px 0;
}

button{
background:#ff3030;
color:white;
border:none;
padding:10px;
margin:5px;
border-radius:8px;
cursor:pointer;
}

.player{
background:#111;
padding:8px;
margin:5px 0;
border-radius:8px;
display:flex;
justify-content:space-between;
}
</style>
</head>

<body>

<h1>INSCRIPTIONS</h1>

<input id="name" placeholder="Pseudo joueur">

<button onclick="addPlayer()">Ajouter</button>
<button onclick="clearAll()">Reset</button>

<div id="list"></div>

<script>

let players = JSON.parse(localStorage.getItem("players") || "[]");

function save(){
localStorage.setItem("players", JSON.stringify(players));
}

function addPlayer(){

let name = document.getElementById("name").value;
if(!name) return;

players.push(name);
document.getElementById("name").value="";

save();
render();
}

function removePlayer(i){
players.splice(i,1);
save();
render();
}

function clearAll(){
players = [];
save();
render();
}

function render(){

let div = document.getElementById("list");
div.innerHTML="";

players.forEach((p,i)=>{
div.innerHTML += `
<div class="player">
${p}
<button onclick="removePlayer(${i})">X</button>
</div>
`;
});

}

render();

</script>

</body>
</html>
