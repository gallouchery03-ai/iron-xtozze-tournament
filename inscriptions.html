<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Inscriptions</title>

<style>
body{background:#050505;color:white;font-family:Arial;padding:20px}
input,button{padding:10px;margin:5px}
button{background:red;color:white;border:none;border-radius:6px}
.player{background:#111;padding:10px;margin:5px;border-radius:6px}
.paid{color:lime}
</style>
</head>

<body>

<h1>👥 INSCRIPTIONS</h1>

<input id="name" placeholder="Pseudo">
<button onclick="add()">Ajouter</button>

<div id="list"></div>

<script>

let players=JSON.parse(localStorage.getItem("players")||"[]");

function save(){
localStorage.setItem("players",JSON.stringify(players));
}

function add(){
let n=document.getElementById("name").value;
if(!n)return;

players.push({name:n,paid:false});
save();
render();
}

function pay(i){
players[i].paid=!players[i].paid;
save();
render();
}

function render(){
let d=document.getElementById("list");
d.innerHTML="";

players.forEach((p,i)=>{
d.innerHTML+=`
<div class="player">
${p.name}
<span class="${p.paid?'paid':''}">
${p.paid?'PAYÉ ✔':'NON PAYÉ'}
</span>
<button onclick="pay(${i})">PAYÉ</button>
</div>
`;
});
}

render();

</script>

</body>
</html>
