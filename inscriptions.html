<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Inscriptions</title>

<style>
body{
background:#050505;
color:white;
font-family:Arial;
padding:20px;
}

input,button{
padding:10px;
margin:5px;
}

button{
background:red;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.player{
background:#111;
padding:10px;
margin:5px;
border-radius:6px;
}
</style>
</head>

<body>

<h1>👥 INSCRIPTIONS JOUEURS</h1>

<input id="name" placeholder="Pseudo">
<button onclick="add()">Ajouter</button>

<div id="list"></div>

<script>

let players = JSON.parse(localStorage.getItem("players")||"[]");

function save(){
localStorage.setItem("players",JSON.stringify(players));
}

function add(){
let n=document.getElementById("name").value;
if(!n)return;

players.push({name:n});
save();
render();
}

function render(){
let d=document.getElementById("list");
d.innerHTML="";

players.forEach(p=>{
d.innerHTML+=`
<div class="player">${p.name}</div>
`;
});
}

render();

</script>

</body>
</html>
